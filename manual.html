<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhoneマニュアル — 株式会社じぶん</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 20px 16px 60px;
    }

    header {
      text-align: center;
      padding: 32px 0 24px;
    }
    header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    header p { font-size: 13px; color: #888; margin-top: 6px; }

    /* 検索 */
    .search-wrap {
      margin-bottom: 24px;
    }
    .search-wrap input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #444; }
    .search-wrap input::placeholder { color: #555; }

    /* カテゴリタブ */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 20px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      color: #888;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active {
      background: #7ee8a2;
      border-color: #7ee8a2;
      color: #0f0f0f;
      font-weight: 700;
    }

    /* カード */
    .cards { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:active { opacity: 0.8; }
    .card-emoji { font-size: 24px; }
    .card-title { flex: 1; font-size: 15px; font-weight: 600; color: #eee; }
    .card-arrow {
      font-size: 12px;
      color: #555;
      transition: transform 0.2s;
    }
    .card.open .card-arrow { transform: rotate(90deg); }

    .card-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #222;
    }
    .card.open .card-body { display: block; }

    /* ステップ */
    .steps { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .step-num {
      flex: 0 0 26px;
      height: 26px;
      background: #2a2a2a;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      color: #7ee8a2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-text { font-size: 14px; color: #ccc; line-height: 1.6; padding-top: 3px; }

    /* ポイント */
    .tip {
      background: #1f2b22;
      border-left: 3px solid #7ee8a2;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
    }
    .tip strong { color: #7ee8a2; }

    /* ヒットなし */
    .no-result {
      text-align: center;
      color: #555;
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>📱 iPhoneマニュアル</h1>
  <p>困ったときにすぐ引ける</p>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍  キーワードで探す（例：スクショ、メール）" oninput="renderCards()">
</div>

<div class="tabs" id="tabs"></div>
<div class="cards" id="cards"></div>

<script>

  {
    category: '基本操作',
    emoji: '📸',
    title: 'スクリーンショットの撮り方',
    steps: [
      'サイドボタン（右側）と音量上ボタンを同時に押す',
      '画面左下にサムネイルが表示される',
      'サムネイルをタップすると編集・書き込みができる',
      'そのまま放置すると写真アプリに保存される',
    ],
    tip: '💡 ホームボタンがある古いiPhoneは「ホームボタン＋スリープボタン（右側）」で撮れます',
  },
  {
    category: '基本操作',
    emoji: '🔊',
    title: '音量・マナーモードの切り替え',
    steps: [
      '左側面の小さなスイッチがマナーモードのスイッチ',
      '下に下げると🔴オレンジが見えてマナーモードON',
      '上に戻すとマナーモードOFF',
      '音量は左側面の音量ボタンで変える',
    ],
    tip: '💡 マナーモードにしても、アラームの音は鳴ります',
  },
  {
    category: '基本操作',
    emoji: '🔋',
    title: 'バッテリー残量を%で表示する',
    steps: [
      '「設定」アプリを開く',
      '「バッテリー」をタップ',
      '「バッテリー残量（%）」をオンにする',
      '画面右上に%が表示されるようになる',
    ],
    tip: null,
  },
  {
    category: 'メール・連絡先',
    emoji: '📧',
    title: 'メールアカウントを追加する（Gmail）',
    steps: [
      '「設定」アプリを開く',
      '「メール」をタップ',
      '「アカウント」→「アカウントを追加」をタップ',
      '「Google」を選んでGmailのアドレスを入力',
      'パスワードを入力して「次へ」',
      '同期する項目を選んで「保存」',
    ],
    tip: '💡 Yahoo!メールは「その他」→「メールアカウントを追加」から設定できます',
  },
  {
    category: 'メール・連絡先',
    emoji: '👤',
    title: '連絡先を追加する',
    steps: [
      '「連絡先」アプリを開く',
      '右上の「＋」をタップ',
      '名前・電話番号・メールを入力',
      '右上の「完了」をタップして保存',
    ],
    tip: '💡 写真のアイコンをタップすると顔写真も設定できます',
  },
  {
    category: 'Wi-Fi・通信',
    emoji: '📶',
    title: 'Wi-Fiに接続する',
    steps: [
      '「設定」アプリを開く',
      '「Wi-Fi」をタップ',
      '繋ぎたいWi-Fiの名前をタップ',
      'パスワードを入力して「接続」',
      '✓マークがついたら接続成功',
    ],
    tip: '💡 接続したことのあるWi-Fiは次回から自動で繋がります',
  },
  {
    category: 'Wi-Fi・通信',
    emoji: '📡',
    title: 'テザリング（スマホをWi-Fiにする）',
    steps: [
      '「設定」アプリを開く',
      '「インターネット共有」をタップ',
      '「ほかの人の接続を許可」をオンにする',
      'パソコンやタブレットからWi-Fiとして繋ぐ',
    ],
    tip: '💡 Wi-Fiパスワードは同じ画面に表示されます。人に教えるときはそこを見せましょう',
  },
  {
    category: '写真・カメラ',
    emoji: '🤳',
    title: '写真を撮る',
    steps: [
      'ホーム画面またはロック画面からカメラアプリを開く',
      '丸いシャッターボタンをタップで撮影',
      '音量ボタンでも撮影できる',
      '左右スワイプでビデオ・ポートレートなどに切り替え',
    ],
    tip: '💡 ロック画面を左にスワイプするとすぐカメラが開きます',
  },
  {
    category: '写真・カメラ',
    emoji: '✂️',
    title: '写真をトリミング（切り取り）する',
    steps: [
      '写真アプリで切り取りたい写真を開く',
      '右上の「編集」をタップ',
      '下部のトリミングアイコン（四角のマーク）をタップ',
      '四隅をドラッグして範囲を決める',
      '「完了」をタップして保存',
    ],
    tip: null,
  },
  {
    category: 'アプリ・設定',
    emoji: '🔔',
    title: 'アプリの通知をオフにする',
    steps: [
      '「設定」アプリを開く',
      '「通知」をタップ',
      '通知をオフにしたいアプリをタップ',
      '「通知を許可」をオフにする',
    ],
    tip: '💡 「サウンド」だけオフにして通知バナーは残す、という設定もできます',
  },
  {
    category: 'アプリ・設定',
    emoji: '🌙',
    title: '集中モード（おやすみモード）の設定',
    steps: [
      '「設定」→「集中モード」をタップ',
      '「おやすみモード」をタップ',
      '「時間を追加」で自動でオンにする時間帯を設定',
      '許可する人・アプリを設定して「完了」',
    ],
    tip: '💡 画面右上からスワイプするコントロールセンターからも素早くオンにできます',
  },
];

const CATEGORIES = ['すべて', ...new Set(DATA.map(d => d.category))];
let activeCategory = 'すべて';

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = CATEGORIES.map(c =>
    `<div class="tab ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</div>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  renderCards();
}

function renderCards() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const el = document.getElementById('cards');

  const filtered = DATA.filter(d => {
    const matchCat = activeCategory === 'すべて' || d.category === activeCategory;
    const matchQuery = !query ||
      d.title.toLowerCase().includes(query) ||
      d.steps.some(s => s.toLowerCase().includes(query));
    return matchCat && matchQuery;
  });

  if (filtered.length === 0) {
    el.innerHTML = '<div class="no-result">見つかりませんでした</div>';
    return;
  }

  el.innerHTML = filtered.map((d, i) => `
    <div class="card" id="card-${i}">
      <div class="card-header" onclick="toggle(${i})">
        <div class="card-emoji">${d.emoji}</div>
        <div class="card-title">${d.title}</div>
        <div class="card-arrow">▶</div>
      </div>
      <div class="card-body">
        <div class="steps">
          ${d.steps.map((s, n) => `
            <div class="step">
              <div class="step-num">${n + 1}</div>
              <div class="step-text">${s}</div>
            </div>
          `).join('')}
        </div>
        ${d.tip ? `<div class="tip">${d.tip}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function toggle(i) {
  const card = document.getElementById('card-' + i);
  card.classList.toggle('open');
}

renderTabs();
renderCards();
</script>
</body>
</html>
