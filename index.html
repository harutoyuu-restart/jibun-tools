<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社じぶん — ツール集</title>
  <style>
    :root {
      --bg: #f0ede8;
      --surface: #ffffff;
      --surface-2: #faf8f5;
      --border: #e0dbd4;
      --text: #2c2826;
      --text-sub: #a09088;
      --accent: #6cc87a;
      --accent-light: #eaf7ed;
      --shadow: 0 2px 8px rgba(44,40,38,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1714;
        --surface: #242018;
        --surface-2: #1e1c18;
        --border: #36312c;
        --text: #f0ede8;
        --text-sub: #8a7e74;
        --accent: #6cc87a;
        --accent-light: #1a2b1e;
        --shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
    }
    :root[data-theme="light"] {
      --bg: #f0ede8; --surface: #ffffff; --surface-2: #faf8f5;
      --border: #e0dbd4; --text: #2c2826; --text-sub: #a09088;
      --accent: #6cc87a; --accent-light: #eaf7ed;
      --shadow: 0 2px 8px rgba(44,40,38,0.08);
    }
    :root[data-theme="dark"] {
      --bg: #1a1714; --surface: #242018; --surface-2: #1e1c18;
      --border: #36312c; --text: #f0ede8; --text-sub: #8a7e74;
      --accent: #6cc87a; --accent-light: #1a2b1e;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ヘッダー */
    header {
      padding: 40px 20px 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    .header-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      text-wrap: balance;
      margin-bottom: 10px;
    }
    .header-desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
    }

    /* 区切り */
    .divider {
      max-width: 480px;
      margin: 0 auto 20px;
      padding: 0 20px;
    }
    .divider-line {
      height: 1px;
      background: var(--border);
    }

    /* ツールカード */
    .tools {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(44,40,38,0.12);
    }
    .tool-card:active { transform: translateY(0); }

    .tool-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex: 0 0 52px;
    }

    .tool-info { flex: 1; min-width: 0; }
    .tool-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .tool-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    .tool-arrow {
      font-size: 16px;
      color: var(--border);
      flex: 0 0 auto;
    }

    /* フッター */
    footer {
      max-width: 480px;
      margin: 40px auto 0;
      padding: 0 20px;
      text-align: center;
    }
    .footer-text {
      font-size: 11px;
      color: var(--text-sub);
      letter-spacing: 0.04em;
    }
    .footer-dot {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 6px;
      vertical-align: middle;
    }
  
    /* パスワード画面 */
    #pw-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      z-index: 999;
    }
    #pw-screen.hidden { display: none; }
    .pw-logo {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 16px;
    }
    .pw-title {
      font-size: 20px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; text-align: center;
    }
    .pw-desc {
      font-size: 13px; color: var(--text-sub);
      margin-bottom: 28px; text-align: center;
    }
    .pw-input {
      width: 100%; max-width: 280px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 16px; padding: 12px 16px;
      outline: none; margin-bottom: 12px;
      text-align: center; letter-spacing: 0.08em;
    }
    .pw-input:focus { border-color: var(--accent); }
    .pw-btn {
      width: 100%; max-width: 280px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      padding: 13px; cursor: pointer;
    }
    .pw-btn:active { opacity: 0.85; }
    .pw-error {
      font-size: 13px; color: #c0504a;
      margin-top: 10px; display: none;
    }
  </style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen">
  <div class="pw-logo">株式会社じぶん</div>
  <div class="pw-title">ツール集</div>
  <div class="pw-desc">合言葉を入力してください</div>
  <input class="pw-input" type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="pw-btn" onclick="checkPw()">入る</button>
  <div class="pw-error" id="pw-error">パスワードが違います</div>
</div>

<script>
  const PW = 'restart0704';
  if (localStorage.getItem('jibun_auth') === PW) {
    document.getElementById('pw-screen').classList.add('hidden');
  }
  function checkPw() {
    const val = document.getElementById('pw-input').value;
    if (val === PW) {
      localStorage.setItem('jibun_auth', PW);
      document.getElementById('pw-screen').classList.add('hidden');
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }
</script>

<header>
  <div class="header-eyebrow">株式会社じぶん</div>
  <h1 class="header-title">ツール集</h1>
  <p class="header-desc">スマホの使い方・人生の設計。<br>身近なことを、少しずつ整えるためのツール。</p>
</header>

<div class="divider"><div class="divider-line"></div></div>

<div class="tools">

  <a class="tool-card" href="roadmap.html">
    <div class="tool-icon">🗺</div>
    <div class="tool-info">
      <div class="tool-name">人生ロードマップ</div>
      <div class="tool-desc">ほしいものを登録して、今の収支からあと何ヶ月で手に入るかを見える化する</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a class="tool-card" href="manual.html">
    <div class="tool-icon">📱</div>
    <div class="tool-info">
      <div class="tool-name">iPhoneマニュアル</div>
      <div class="tool-desc">スクショ・メール設定・Wi-Fiなど、よく使う操作をすぐ引ける</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a class="tool-card" href="practice.html">
    <div class="tool-icon">✋</div>
    <div class="tool-info">
      <div class="tool-name">iPhoneハンズオン</div>
      <div class="tool-desc">画面を実際に操作しながらiPhoneの使い方を練習できる</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

</div>

<footer>
  <p class="footer-text">
    株式会社じぶん<span class="footer-dot"></span>by ゆう
  </p>
</footer>

</body>
</html>
